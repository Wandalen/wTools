[package]
name = "fs_tools"
version = "0.1.0"
edition = "2021"
authors = [
  "Kostiantyn Mysnyk <wandalen@obox.systems>",
]
license = "MIT"
readme = "readme.md"
documentation = "https://docs.rs/fs_tools"
repository = "https://github.com/Wandalen/wTools/tree/master/module/deprecated/fs_tools"
homepage = "https://github.com/Wandalen/wTools/tree/master/module/deprecated/fs_tools"
description = """
Collection of algorithms and structures to handle files properly.
"""
categories = [ "algorithms", "development-tools" ]
keywords = [ "fundamental", "general-purpose" ]
include = [
  "/Cargo.toml",
  "/readme.md",
  "/license",
  "/src/",
]

[lints]
workspace = true

[package.metadata.docs.rs]
features = [ "full" ]
all-features = false

[features]
default   = [ "enabled" ]
full      = [ "enabled", "dep:file_tools", "file_tools/full" ]
enabled   = [ "dep:file_tools", "file_tools/enabled" ]
glob      = [ "enabled", "dep:file_tools", "file_tools/glob" ]
no_std    = [ "file_tools/no_std" ]
use_alloc = [ "no_std", "file_tools/use_alloc" ]

[dependencies]
file_tools = { workspace = true, optional = true }

[dev-dependencies]
test_tools = { workspace = true, features = [ "full" ] }
