[package]
name = "impls_index"
version = "0.11.0"
edition = "2021"
authors = [
  "Kostiantyn Mysnyk <wandalen@obox.systems>",
  "Dmytro Kryvoruchko <dmytro.kr@obox.systems>",
]
license = "MIT"
readme = "readme.md"
documentation = "https://docs.rs/impls_index"
repository = "https://github.com/Wandalen/wTools/tree/master/module/deprecated/impls_index"
homepage = "https://github.com/Wandalen/wTools/tree/master/module/deprecated/impls_index"
description = """
Several of macros to put each function under a named macro to index every function in a class.
"""
categories = [ "algorithms", "development-tools" ]
keywords = [ "fundamental", "general-purpose" ]

[lints]
workspace = true

[package.metadata.docs.rs]
features = [ "full" ]
all-features = false

[features]
default = [ "enabled" ]
full = [ "enabled" ]
enabled = [ "dep:impls_index_meta", "impls_index_meta/enabled" ]
# Declared to satisfy cfg checks from test_tools dependency macros
diagnostics_runtime_assertions = []

[dependencies]
impls_index_meta = { workspace = true, optional = true }

[dev-dependencies]
test_tools = { workspace = true, features = [ "full", "standalone_build" ] }
#tempdir = { version = "0.3.7" }
