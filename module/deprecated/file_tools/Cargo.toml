[package]
name = "file_tools"
version = "0.2.0"
edition = "2021"
authors = [
  "Kostiantyn Mysnyk <wandalen@obox.systems>",
  "Dmytro Kryvoruchko <dmytro.kr@obox.systems>",
]
license = "MIT"
readme = "readme.md"
documentation = "https://docs.rs/file_tools"
repository = "https://github.com/Wandalen/wTools/tree/master/module/experimental/file_tools"
homepage = "https://github.com/Wandalen/wTools/tree/master/module/experimental/file_tools"
description = """
Tools to manipulate files.
"""
categories = [ "algorithms", "development-tools" ]
keywords = [ "fundamental", "general-purpose", "testing" ]

[lints]
workspace = true

[lib]
path = "src/fs/lib.rs"

[package.metadata.docs.rs]
features = [ "full" ]
all-features = false

[package.metadata.willbe]
features = [ "full" ]
all_features = false

[features]
default = [ "enabled", "glob" ]
full = [ "enabled", "glob" ]
no_std = []
use_alloc = [ "no_std" ]
enabled = []
glob = [ "enabled", "dep:glob" ]

[dependencies]
glob = { workspace = true, optional = true }

[dev-dependencies]
test_tools = { workspace = true, features = [ "full" ] }
tempfile = { workspace = true }
