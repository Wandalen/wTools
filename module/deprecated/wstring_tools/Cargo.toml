[package]
name = "wstring_tools"
version = "0.2.0"
edition = "2021"
authors = [
  "Kostiantyn Mysnyk <wandalen@obox.systems>",
  "Dmytro Kryvoruchko <dmytro.kr@obox.systems>",
]
license = "MIT"
readme = "readme.md"
documentation = "https://docs.rs/wstring_tools"
repository = "https://github.com/Wandalen/wTools/tree/master/module/deprecated/wstring_tools"
homepage = "https://github.com/Wandalen/wTools/tree/master/module/deprecated/wstring_tools"
description = """
Tools to manipulate strings.
"""
categories = [ "algorithms", "development-tools" ]
keywords = [ "fundamental", "general-purpose" ]

[lints]
workspace = true

[package.metadata.docs.rs]
features = [ "full" ]
all-features = false

include = [
  "/Cargo.toml",
  "/src/",
  "/readme.md",
  "/license",
]

[features]
default = [
  "enabled",
  "indentation",
  # "isolate",
  # "parse_request",
  # "split",
  "parse_number",
]
full = [
  "enabled",
  "indentation",
  "isolate",
  "parse_request",
  "split",
  "parse_number",
]
enabled = [ "dep:strs_tools" ]
std = [ "strs_tools/std" ]
no_std = [ "strs_tools/no_std" ]
use_alloc = [ "strs_tools/use_alloc" ]

indentation = [ "strs_tools/string_indentation" ]
isolate = [ "strs_tools/string_isolate" ]
parse_request  = [ "split", "isolate", "strs_tools/string_parse_request" ]
parse_number = [ "strs_tools/string_parse_number" ]
split = [ "std", "strs_tools/string_split" ]

[dependencies]
strs_tools = { workspace = true, optional = true }

[dev-dependencies]
test_tools = { workspace = true, features = [ "full" ] }
