[package]
name = "data_fmt"
version = "0.1.0"
edition = "2021"
authors = [ "wandalen <wandalen@obox.systems>" ]
license = "MIT"
repository = "https://github.com/Wandalen/wTools/tree/master/module/core/data_fmt"
description = "Multi-format data visualization library with 10 formatters, 33 variants, and granular feature flags"
keywords = [ "table", "formatter", "data-format", "visualization", "tree" ]
categories = [ "text-processing", "data-structures", "visualization" ]

[lints]
workspace = true

[dependencies]
error_tools   = { workspace = true, optional = true }
# ANSI-aware string utilities (from strs_tools)
strs_tools    = { workspace = true, features = [ "ansi" ], optional = true }
color_tools   = { workspace = true, features = [ "enabled" ], optional = true }
unicode-width = { version = "0.1", optional = true }
terminal_size = { version = "0.4", optional = true }

# Optional dependencies for data format serialization
serde = { workspace = true, features = ["derive"], optional = true }
serde_json = { workspace = true, optional = true }
serde_yaml = { workspace = true, optional = true }
toml = { workspace = true, optional = true }

[dev-dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
toml = { workspace = true }

[features]
default = []
full    = [ "enabled", "all_formats", "dep:terminal_size" ]
enabled =
[
  "dep:error_tools",
  "error_tools/enabled",
  "error_tools/error_typed",
  "dep:strs_tools",
  "strs_tools/ansi",
  "dep:color_tools",
  "color_tools/enabled",
  "dep:unicode-width",
  "table_plain",
  "expanded_postgres",
  "tree_hierarchical",
  "format_logfmt",
]

# Serialization support (required for json/yaml/toml)
serde_support = [ "dep:serde", "color_tools/serde_support" ]

# TableFormatter variants
table_plain = []
table_minimal = []
table_bordered = []
table_markdown = []
table_grid = []
table_unicode = []
table_csv = []
table_tsv = []
table_compact = []

# ExpandedFormatter variants
expanded_postgres = []
expanded_property = []

# TreeFormatter variants
tree_hierarchical = []
tree_aligned = []
tree_aggregated = []

# TextFormatter (all 5 variants: Bullets, Numbered, Sections, KeyValue, Compact)
format_text = []

# JsonFormatter (Pretty/Compact modes at runtime)
format_json = [ "serde_support", "dep:serde_json" ]

# YamlFormatter
format_yaml = [ "serde_support", "dep:serde_yaml" ]

# TomlFormatter
format_toml = [ "serde_support", "dep:toml" ]

# LogfmtFormatter
format_logfmt = []

# HtmlFormatter variants
html_minimal = []
html_bootstrap = []
html_tailwind = []
html_custom = []

# SqlFormatter variants
sql_ansi = []
sql_postgres = []
sql_mysql = []
sql_sqlite = []

# Color themes (optional enhancement)
themes = []

# Meta-features for convenience
format_table_visual = [ "table_plain", "table_minimal", "table_bordered", "table_markdown", "table_grid", "table_unicode", "table_compact" ]
format_table_export = [ "table_csv", "table_tsv" ]
format_table = [ "format_table_visual", "format_table_export" ]

format_expanded = [ "expanded_postgres", "expanded_property" ]

format_tree = [ "tree_hierarchical", "tree_aligned", "tree_aggregated" ]

format_html_basic = [ "html_minimal", "html_custom" ]
format_html_frameworks = [ "html_bootstrap", "html_tailwind" ]
format_html = [ "format_html_basic", "format_html_frameworks" ]

format_sql = [ "sql_ansi", "sql_postgres", "sql_mysql", "sql_sqlite" ]

# Convenience meta-bundles
format_meta_visual = [ "format_table", "format_expanded", "format_tree", "format_logfmt" ]
format_meta_web    = [ "format_html", "format_sql" ]
format_meta_data   = [ "format_json", "format_yaml", "format_toml" ]
all_formats        = [ "format_meta_visual", "format_meta_web", "format_meta_data", "format_text", "themes" ]
