[package]
name = "wtools"
version = "0.3.0"
edition = "2021"
authors = [
  "Kostiantyn Mysnyk <wandalen@obox.systems>",
]
license = "MIT"
readme = "readme.md"
documentation = "https://docs.rs/wtools"
repository = "https://github.com/Wandalen/wTools/tree/master/module/core/wtools"
homepage = "https://github.com/Wandalen/wTools/tree/master/module/core/wtools"
description = """
Single entry-point for collection utilities. Re-exports collection_tools: variadic constructors and unified HashMap/HashSet/Vec support.
"""
categories = [ "data-structures", "development-tools" ]
keywords = [ "collections", "hashmap", "hashset", "general-purpose" ]

[lints]
workspace = true

[package.metadata.docs.rs]
features = [ "full" ]
all-features = false

# = features

[features]

default = [ "enabled", "collection_constructors", "collection_into_constructors" ]

full = [
  "enabled",
  "collection_constructors",
  "collection_into_constructors",
]

enabled = [ "dep:collection_tools", "collection_tools/enabled" ]

collection_constructors = [ "enabled", "collection_tools/collection_constructors" ]
collection_into_constructors = [ "enabled", "collection_tools/collection_into_constructors" ]

no_std = [ "collection_tools/no_std" ]
use_alloc = [ "no_std", "collection_tools/use_alloc" ]

[dependencies]
collection_tools = { workspace = true, optional = true }

[dev-dependencies]
test_tools = { workspace = true, features = [ "full" ] }
