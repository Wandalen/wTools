[package]
name = "process_tools"
version = "0.33.0"
edition = "2021"
authors = [
  "Kostiantyn Mysnyk <wandalen@obox.systems>",
]
license = "MIT"
readme = "readme.md"
documentation = "https://docs.rs/process_tools"
repository = "https://github.com/Wandalen/wTools/tree/master/module/core/process_tools"
homepage = "https://github.com/Wandalen/wTools/tree/master/module/core/process_tools"
description = """
Collection of algorithms and structures to handle processes properly.
"""
categories = [ "algorithms", "development-tools" ]
keywords = [ "fundamental", "general-purpose" ]

[lints]
workspace = true

[package.metadata.docs.rs]
features = [ "full" ]
all-features = false

[features]
default = [ "enabled", "process_environment_is_cicd" ]
full = [ "enabled", "process_environment_is_cicd" ]
enabled = [
  "dep:mod_interface",
  "mod_interface/enabled",
  "dep:former",
  "former/enabled",
  "dep:error_tools",
  "error_tools/enabled",
  "dep:itertools",
  "dep:duct",
  "dep:libc",
]

process_environment_is_cicd = []


[dependencies]
mod_interface = { workspace = true, optional = true }
former = { workspace = true, features = [ "derive_former" ], optional = true }
error_tools = { workspace = true, features = [ "error_untyped" ], optional = true }
itertools = { workspace = true, features = [ "use_std" ], optional = true }

## external
duct = { version = "0.13.7", optional = true }
libc = { workspace = true, optional = true }


[dev-dependencies]
test_tools = { workspace = true, features = [ "full", "standalone_build" ] }
assert_fs = { version = "1.1.1" }
