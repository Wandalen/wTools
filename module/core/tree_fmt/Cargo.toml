[package]
name = "tree_fmt"
version = "0.13.0"
edition = "2021"
authors = [ "wandalen <wandalen@obox.systems>" ]
license = "MIT"
repository = "https://github.com/Wandalen/wTools/tree/master/module/core/tree_fmt"
description = "Deprecated: use data_fmt instead. Re-export shim for backward compatibility."
keywords = [ "deprecated", "table", "formatter", "data-format", "visualization" ]
categories = [ "text-processing", "data-structures", "visualization" ]

[lints]
workspace = true

[dependencies]
data_fmt = { workspace = true, default-features = false }

[dev-dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
toml = { workspace = true }
unicode-width = "0.1"

[features]
default = [ "table_plain", "expanded_postgres", "tree_hierarchical", "format_logfmt" ]

# Legacy integration flag
integration = []

# Serialization support
serde_support = [ "data_fmt/serde_support" ]

# TableFormatter variants
table_plain = [ "data_fmt/table_plain" ]
table_minimal = [ "data_fmt/table_minimal" ]
table_bordered = [ "data_fmt/table_bordered" ]
table_markdown = [ "data_fmt/table_markdown" ]
table_grid = [ "data_fmt/table_grid" ]
table_unicode = [ "data_fmt/table_unicode" ]
table_csv = [ "data_fmt/table_csv" ]
table_tsv = [ "data_fmt/table_tsv" ]
table_compact = [ "data_fmt/table_compact" ]

# ExpandedFormatter variants
expanded_postgres = [ "data_fmt/expanded_postgres" ]
expanded_property = [ "data_fmt/expanded_property" ]

# TreeFormatter variants
tree_hierarchical = [ "data_fmt/tree_hierarchical" ]
tree_aligned = [ "data_fmt/tree_aligned" ]
tree_aggregated = [ "data_fmt/tree_aggregated" ]

# TextFormatter
format_text = [ "data_fmt/format_text" ]

# JsonFormatter
format_json = [ "data_fmt/format_json" ]

# YamlFormatter
format_yaml = [ "data_fmt/format_yaml" ]

# TomlFormatter
format_toml = [ "data_fmt/format_toml" ]

# LogfmtFormatter
format_logfmt = [ "data_fmt/format_logfmt" ]

# HtmlFormatter variants
html_minimal = [ "data_fmt/html_minimal" ]
html_bootstrap = [ "data_fmt/html_bootstrap" ]
html_tailwind = [ "data_fmt/html_tailwind" ]
html_custom = [ "data_fmt/html_custom" ]

# SqlFormatter variants
sql_ansi = [ "data_fmt/sql_ansi" ]
sql_postgres = [ "data_fmt/sql_postgres" ]
sql_mysql = [ "data_fmt/sql_mysql" ]
sql_sqlite = [ "data_fmt/sql_sqlite" ]

# Color themes
themes = [ "data_fmt/themes" ]

# Meta-features
format_table_visual = [ "table_plain", "table_minimal", "table_bordered", "table_markdown", "table_grid", "table_unicode", "table_compact" ]
format_table_export = [ "table_csv", "table_tsv" ]
format_table = [ "format_table_visual", "format_table_export" ]

format_expanded = [ "expanded_postgres", "expanded_property" ]

format_tree = [ "tree_hierarchical", "tree_aligned", "tree_aggregated" ]

format_html_basic = [ "html_minimal", "html_custom" ]
format_html_frameworks = [ "html_bootstrap", "html_tailwind" ]
format_html = [ "format_html_basic", "format_html_frameworks" ]

format_sql = [ "sql_ansi", "sql_postgres", "sql_mysql", "sql_sqlite" ]

# Legacy bundles
visual_formats = [ "format_table", "format_expanded", "format_tree", "format_logfmt" ]
web_formats = [ "format_html", "format_sql" ]
data_formats = [ "format_json", "format_yaml", "format_toml" ]
all_formats = [ "visual_formats", "web_formats", "data_formats", "format_text", "themes" ]
