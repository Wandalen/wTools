[ package ]
name = "multiline_input"
version = "0.2.0"
edition = "2021"
authors = [ "wTools Contributors" ]
license = "MIT"
description = "Terminal multiline input with rich editing (ENTER to submit, CTRL+ENTER for newline)"
repository = "https://github.com/Wandalen/wTools"
keywords = [ "terminal", "input", "multiline", "cli", "interactive" ]
categories = [ "command-line-interface", "text-editors" ]

[ dependencies ]
# Terminal control and raw mode
crossterm = { workspace = true }

# Error handling (mandatory per PRO rulebook)
error_tools = { workspace = true, features = [ "enabled", "error_typed" ] }

# Optional: Line editing enhancements
unicode-width = { workspace = true }
unicode-segmentation = { workspace = true }

[ dev-dependencies ]
tempfile = { workspace = true }

[ lib ]
name = "multiline_input"
path = "src/lib.rs"

[ features ]
default = [ "enabled" ]
enabled = []
full = [ "enabled", "color" ]
color = []  # Enable colored output
