components:
  # Component 1: main connected cluster (20 nodes)
  # All feature and invariant nodes reachable through the feature/014 hub
  # are part of one component.

  # Isolated nodes: invariant/003, invariant/004, invariant/005, invariant/007
  # These invariants reference only source, test, or config entries in their
  # Cross-References tables — no doc-type edges connect them to the main graph.

  - id: isolated/invariant-003
    nodes: [ invariant/003 ]
    gap: >
      Test Coverage invariant references only the tests/ directory (source/test
      entries), with no cross-references to other doc instances. It is isolated
      by design — coverage is a process metric, not tied to a specific feature.

  - id: isolated/invariant-004
    nodes: [ invariant/004 ]
    gap: >
      Compilation Impact invariant references only Cargo.toml configuration
      (config entry), with no cross-references to other doc instances. It is
      isolated by design — build time is a workspace-level metric, not feature-specific.

  - id: isolated/invariant-005
    nodes: [ invariant/005 ]
    gap: >
      Documentation Coverage invariant references only source code (source entry),
      with no cross-references to other doc instances. It governs all public items
      uniformly rather than any one feature.

  - id: isolated/invariant-007
    nodes: [ invariant/007 ]
    gap: >
      Backward Compatibility invariant references only Cargo.toml (config entry),
      with no cross-references to other doc instances. Semver compliance is a
      release-process constraint that spans the entire public API rather than
      any specific feature.
