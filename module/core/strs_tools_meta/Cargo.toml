[package]
name = "strs_tools_meta"
version = "0.20.1"
edition = "2021"
authors = [
  "Kostiantyn Mysnyk <wandalen@obox.systems>",
]
license = "MIT"
description = "Procedural macros for strs_tools compile-time optimizations. Its meta module. Don't use directly."
categories = [ "development-tools" ]
keywords = [ "procedural-macro", "compile-time", "optimization" ]
readme = "readme.md"
documentation = "https://docs.rs/strs_tools_meta"
repository = "https://github.com/Wandalen/wTools/tree/master/module/core/strs_tools_meta"
homepage = "https://github.com/Wandalen/wTools/tree/master/module/core/strs_tools_meta"

[lints]
workspace = true

[package.metadata.docs.rs]
features = [ "full" ]
all-features = false

[lib]
proc-macro = true

[features]
default = [ "enabled" ]
full = [
  "enabled",

  "optimize_split",
  "optimize_match",
]
enabled = []

optimize_split = [ "dep:macro_tools" ]
optimize_match = [ "dep:macro_tools" ]

[[example]]
name = "split_basic"
required-features = [ "optimize_split" ]

[[example]]
name = "match_basic"
required-features = [ "optimize_match" ]

[dependencies]
macro_tools = { workspace = true, features = [ "attr", "ct", "diag", "typ", "derive", "enabled" ], optional = true }

