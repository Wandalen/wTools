[package]
name = "claude_storage_core"
version = "1.0.1"
edition = "2021"
authors = [ "Kostiantyn Mysnyk <wandalen@obox.systems>" ]
description = "Core library for Claude Code filesystem storage access (zero dependencies)"
license = "MIT"
repository = "https://github.com/Wandalen/wTools/tree/alpha/module/claude_storage_core"
readme = "readme.md"
keywords = [ "claude", "storage", "jsonl", "conversation", "parser" ]
categories = [ "development-tools", "filesystem", "parsing" ]

[dependencies]
# ZERO runtime dependencies - this is a core guarantee

[features]
default = [ "enabled" ]
enabled = []
full = [ "enabled" ]

[dev-dependencies]
tempfile = { workspace = true }
