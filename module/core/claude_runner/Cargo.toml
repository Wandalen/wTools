[package]
name = "claude_runner"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true

[lib]
name = "claude_runner"
path = "src/lib.rs"

[[bin]]
name = "claude_runner"
path = "src/main.rs"
required-features = ["enabled"]

[lints]
workspace = true

[features]
default = [ "enabled" ]
full = [ "enabled" ]
enabled = [
  "dep:dream_agent", "dream_agent/enabled",
  "dep:unilang",
  "dep:wplan_core",
  "dep:wplan", "wplan/enabled",
  "dep:phf",
]

[dependencies]
dream_agent    = { workspace = true, optional = true }
unilang        = { workspace = true, features = ["approach_yaml_multi_build"], optional = true }
wplan_core     = { workspace = true, optional = true }
wplan          = { workspace = true, features = ["enabled"], optional = true }
phf            = { workspace = true, features = ["macros"], optional = true }

[build-dependencies]
unilang = { workspace = true, features = ["approach_yaml_multi_build"] }
serde = { workspace = true, features = ["derive"] }
serde_yaml.workspace = true
version_bump = { workspace = true, features = ["enabled"] }

[dev-dependencies]
test_tools = { workspace = true }
edition = "2021"
