[package]
name = "claude_runner"
version = "0.1.0"
edition = "2021"
authors = [ "Kostiantyn Wandalen <wandalen@obox.systems>" ]
license = "MIT"
readme = "readme.md"
description = "CLI for executing Claude Code with configurable builder pattern"

[lints]
workspace = true

[features]
default = [ "enabled" ]
full = [ "enabled" ]
enabled = [
  "dep:claude_runner_core",
  "claude_runner_core/enabled",
  "dep:error_tools",
  "error_tools/enabled",
  "error_tools/error_untyped",
  "dep:unilang",
]

[dependencies]
claude_runner_core = { workspace = true, optional = true }
error_tools = { workspace = true, optional = true }
unilang = { workspace = true, optional = true }
