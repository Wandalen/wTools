[package]
name = "claude_storage"
version = "1.3.0"
edition = "2021"
authors = [ "Kostiantyn Mysnyk <wandalen@obox.systems>" ]
description = "CLI tool for exploring Claude Code filesystem storage"
license = "MIT"
repository = "https://github.com/Wandalen/wTools/tree/alpha/module/claude_storage"
readme = "readme.md"
keywords = [ "claude", "storage", "cli", "conversation", "tool" ]
categories = [ "development-tools", "command-line-utilities" ]

[dependencies]
# Core library for all storage operations
claude_storage_core = { workspace = true }

# CLI dependencies (optional, only for binary)
unilang = { workspace = true, optional = true }
phf = { workspace = true, features = [ "macros" ], optional = true }

[dev-dependencies]
tempfile = { workspace = true }
assert_cmd = { workspace = true }

[build-dependencies]
serde_yaml = { workspace = true }
unilang = { workspace = true }

[[bin]]
name = "claude_storage"
required-features = [ "cli" ]

[features]
default = [ "enabled", "cli" ]
enabled = []
full = [ "enabled", "cli" ]
cli = [ "unilang", "phf" ]
