[package]
name = "pth"
version = "0.37.0"
edition = "2021"
authors = [
  "Kostiantyn Mysnyk <wandalen@obox.systems>",
]
license = "MIT"
readme = "readme.md"
documentation = "https://docs.rs/pth"
repository = "https://github.com/Wandalen/wTools/tree/master/module/core/pth"
homepage = "https://github.com/Wandalen/wTools/tree/master/module/core/pth"
description = """
Collection of algorithms and structures to handle paths properly.
"""
categories = [ "algorithms", "development-tools" ]
keywords = [ "fundamental", "general-purpose" ]

[lints]

[package.metadata.docs.rs]
features = [ "full" ]
all-features = false

[features]
default = [ "enabled" ]
full = [
  "enabled",
  "derive_serde",
  "path_utf8",
  "path_unique_folder_name",
]
no_std = []
# qqq : xxx : negate no_std
# use_std = []
use_alloc = [ "no_std" ]
enabled = [ "dep:mod_interface", "dep:mod_interface_meta", "dep:regex" ]

path_unique_folder_name = []
derive_serde = [ "serde" ]
path_utf8 = [ "camino" ]
mod_interface_meta = ["dep:mod_interface_meta"]

[dependencies]
# qqq : xxx : make sure all dependencies are in workspace
regex = { workspace = true, optional = true }
mod_interface = { workspace = true, optional = true }
serde = { workspace = true, optional = true, features = [ "derive" ] }
camino = { workspace = true, optional = true }
mod_interface_meta = { workspace = true, optional = true, features = ["enabled"] }

[dev-dependencies]
