[package]
name = "cli_fmt"
version = "0.9.2"
edition = "2021"
authors = [ "wTools Contributors" ]
license = "MIT"
description = "CLI output formatting utilities for command-line applications"
repository = "https://github.com/Wandalen/wTools"
documentation = "https://docs.rs/cli_fmt"
keywords = [ "cli", "command-line", "output", "formatting", "display" ]
categories = [ "command-line-utilities", "development-tools" ]

[dependencies]
strs_tools = { version = "~0.48.1", features = [ "ansi", "string_split", "std" ], optional = true }

[dev-dependencies]

[[example]]
name = "basic_usage"
path = "examples/basic_usage.rs"
required-features = [ "enabled", "output", "cli_help_template" ]

[features]
# Default features enable the full public API surface
default = [ "enabled", "output", "ansi_unicode", "cli_help_template" ]

# Master switch - activates core dependencies
enabled = [ "dep:strs_tools" ]
std = []
use_alloc = []
string_split = []
ansi_unicode = [ "strs_tools/ansi_unicode" ]

# Individual modules
output = [ "enabled", "std", "string_split" ]

# Structured CLI help template (data model + colour-aware renderer)
cli_help_template = [ "std" ]

# Composite features - enables all functionality
full = [ "enabled", "output", "ansi_unicode", "cli_help_template" ]
