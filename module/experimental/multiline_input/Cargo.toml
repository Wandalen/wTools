[ package ]
name = "multiline_input"
version = "0.4.0"
edition = "2021"
authors = [ "wTools Contributors" ]
license = "MIT"
description = "Terminal multiline input with rich editing (ENTER to submit, CTRL+ENTER for newline)"
repository = "https://github.com/Wandalen/wTools"
keywords = [ "terminal", "input", "multiline", "cli", "interactive" ]
categories = [ "command-line-interface", "text-editors" ]

[ dependencies ]
crossterm = { workspace = true, optional = true }
error_tools = { workspace = true, optional = true }
unicode-width = { workspace = true, optional = true }
unicode-segmentation = { workspace = true, optional = true }

[ dev-dependencies ]
tempfile = { workspace = true }

[ lib ]
name = "multiline_input"
path = "src/lib.rs"

[ features ]
default = [ "enabled" ]
enabled = [ "dep:crossterm", "dep:error_tools", "error_tools/enabled", "error_tools/error_typed", "dep:unicode-width", "dep:unicode-segmentation" ]
full = [ "enabled", "color" ]
color = []
