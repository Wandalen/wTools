[package]
name = "sqlx_query"
version = "0.2.1"
edition = "2021"
authors = [
  "Kostiantyn Mysnyk <wandalen@obox.systems>",
  "Viktor Dudnik <viktor.d@obox.systems>",
]
license = "MIT"
readme = "readme.md"
documentation = "https://docs.rs/sqlx_query"
repository = "https://github.com/Wandalen/wTools/tree/master/module/experimental/sqlx_query"
homepage = "https://github.com/Wandalen/wTools/tree/master/module/experimental/sqlx_query"
description = """
Expands to either sqlx function `query` or macro `query!` call depending on `sqlx_compiletime_checks` has been enabled during the build.
"""

[lints]
workspace = true

[package.metadata.docs.rs]
features = [ "full" ]
all-features = false


[features]
default = [ "enabled" ]
full = [ "enabled" ]
no_std = []
use_alloc = [ "no_std" ]
enabled = []

# Feature defined by consumer crate to control compile-time vs runtime query checking.
# When enabled: macros expand to runtime query functions (faster builds, no DB at compile time)
# When disabled: macros expand to compile-time checked macros (slower builds, DB required)
sqlx_compiletime_checks = []

[dependencies]

[dev-dependencies]
test_tools = { workspace = true, features = [ "full" ] }