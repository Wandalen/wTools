[package]
name = "program_tools"
version = "0.1.0"
edition = "2021"
authors = [
  "Kostiantyn Mysnyk <wandalen@obox.systems>",
]
license = "MIT"
readme = "readme.md"
documentation = "https://docs.rs/program_tools"
repository = "https://github.com/Wandalen/wTools/tree/master/module/experimental/program_tools"
homepage = "https://github.com/Wandalen/wTools/tree/master/module/experimental/program_tools"
description = """
Builder types for in-memory Rust program representation: Source, Program, and Plan.
"""
categories = [ "data-structures", "development-tools" ]
keywords = [ "program", "builder", "representation", "source", "plan" ]

[lints]
workspace = true


[package.metadata.docs.rs]
features = [ "full" ]
all-features = false


[features]
default = [ "enabled" ]
full = [
  "enabled"
 ]

enabled = [
  "mod_interface/enabled",
  "former/enabled",
  "pth/enabled",
  "error_tools/enabled",
  "iter_tools/enabled",
]

[dependencies]
mod_interface = { workspace = true }
former = { workspace = true, features = [ "derive_former" ] }
pth = { workspace = true }
error_tools = { workspace = true, features = [ "error_untyped" ] } # qqq : xxx : rid of error_untyped
iter_tools = { workspace = true }

[dev-dependencies]
test_tools = { workspace = true, features = [ "full" ] }
