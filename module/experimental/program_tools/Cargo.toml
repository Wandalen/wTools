[package]
name = "program_tools"
version = "0.5.1"
edition = "2021"
authors = [
  "Kostiantyn Mysnyk <wandalen@obox.systems>",
]
license = "MIT"
readme = "readme.md"
documentation = "https://docs.rs/program_tools"
repository = "https://github.com/Wandalen/wTools/tree/master/module/experimental/program_tools"
homepage = "https://github.com/Wandalen/wTools/tree/master/module/experimental/program_tools"
description = """
Rust script runner — compile and execute Rust files as scripts with output capture.
"""
categories = [ "development-tools::testing", "development-tools::build-utils" ]
keywords = [ "script", "runner", "testing", "execute", "compile" ]

[lints]
workspace = true


[package.metadata.docs.rs]
features = [ "full" ]
all-features = false


[features]
default = [ "enabled" ]
full = [
  "enabled"
 ]

enabled = [
  "dep:mod_interface",
  "mod_interface/enabled",
  "dep:former",
  "former/enabled",
  "dep:error_tools",
  "error_tools/enabled",
  "error_tools/error_untyped",
  "dep:clap",
]

[dependencies]
mod_interface = { workspace = true, optional = true }
former = { workspace = true, features = [ "derive_former" ], optional = true }
error_tools = { workspace = true, features = [ "error_untyped" ], optional = true }
clap = { workspace = true, features = [ "derive" ], optional = true }

[dev-dependencies]
test_tools = { workspace = true, features = [ "full" ] }

[[bin]]
name = "program_tools"
path = "src/main.rs"
required-features = [ "enabled" ]

[[bin]]
name = "pt"
path = "src/bin/pt.rs"
required-features = [ "enabled" ]

[[example]]
name = "basic"
path = "examples/basic.rs"
required-features = [ "enabled" ]
