[package]
name = "for_each"
version = "0.11.0"
edition = "2021"
authors = [
  "Kostiantyn Mysnyk <wandalen@obox.systems>",
  "Dmytro Kryvoruchko <dmytro.kr@obox.systems>",
]
license = "MIT"
readme = "readme.md"
documentation = "https://docs.rs/for_each"
repository = "https://github.com/Wandalen/wTools/tree/master/module/experimental/for_each"
homepage = "https://github.com/Wandalen/wTools/tree/master/module/experimental/for_each"
description = """
Apply macro for each element of a list.
"""
categories = [ "algorithms", "development-tools" ]
keywords = [ "fundamental", "general-purpose" ]

[lints]
workspace = true

[package.metadata.docs.rs]
features = [ "full" ]
all-features = false


[features]
default = [ "enabled" ]
full = [ "enabled" ]
no_std = []
use_alloc = [ "no_std" ]
enabled = []

[[example]]
name = "for_each_trivial"
path = "examples/for_each_trivial.rs"
required-features = [ "enabled" ]

[[example]]
name = "for_each_map_style_sample"
path = "examples/for_each_map_style_sample.rs"
required-features = [ "enabled" ]

[dependencies]

[dev-dependencies]
test_tools = { workspace = true, features = [ "full", "standalone_build" ] }
