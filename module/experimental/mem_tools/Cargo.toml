[package]
name = "mem_tools"
version = "0.9.0"
edition = "2021"
authors = [
  "Kostiantyn Mysnyk <wandalen@obox.systems>",
  "Dmytro Kryvoruchko <dmytro.kr@obox.systems>",
]
license = "MIT"
readme = "readme.md"
documentation = "https://docs.rs/mem_tools"
repository = "https://github.com/Wandalen/wTools/tree/master/module/experimental/mem_tools"
homepage = "https://github.com/Wandalen/wTools/tree/master/module/experimental/mem_tools"
description = """
Collection of tools to manipulate memory.
"""
categories = [ "algorithms", "development-tools" ]
keywords = [ "fundamental", "general-purpose" ]

[lints.rust]
rust_2018_idioms = { level = "warn", priority = -1 }
future_incompatible = { level = "warn", priority = -1 }
missing_docs = "warn"
missing_debug_implementations = "warn"
unsafe-code = "deny"
unexpected_cfgs = { level = "warn", check-cfg = [
  'cfg(feature, values("diagnostics_runtime_assertions", "collection_constructors", "error_untyped", "standalone_collection_tools", "standalone_diagnostics_tools", "standalone_error_tools", "standalone_impls_index", "typing_inspect_type"))'
] }

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
undocumented_unsafe_blocks = "deny"
std_instead_of_core = "warn"
doc_include_without_cfg = "warn"
missing_inline_in_public_items = "allow"
single_call_fn = "allow"
inline_always = "allow"
module_name_repetitions = "allow"
absolute_paths = "allow"
wildcard_imports = "allow"
std_instead_of_alloc = "allow"
items_after_statements = "allow"
cast_precision_loss = "allow"
pub_use = "allow"
question_mark_used = "allow"
implicit_return = "allow"
arbitrary_source_item_ordering = "allow"
mod_module_files = "allow"
missing_docs_in_private_items = "allow"
large_enum_variant = "allow"
struct_excessive_bools = "allow"

[package.metadata.docs.rs]
features = [ "full" ]
all-features = false

include = [
  "/rust/impl/mem",
  "/Cargo.toml",
  "/readme.md",
  "/License",
]

[features]
default = [
  "enabled",

]
full = [
  "enabled",

  "use_alloc",
]
no_std = []
use_alloc = [ "no_std" ]
enabled = []

[dependencies]

[dev-dependencies]
test_tools = { workspace = true, features = [ "full", "standalone_build" ] }
