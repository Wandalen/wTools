[package]
name = "claude_session"
version = "0.1.0"
edition = "2021"
authors = [ "Kostiantyn Mysnyk <wandalen@obox.systems>" ]
license = "MIT"
description = "Session-based programmatic access to Claude Code CLI"
repository = "https://github.com/Wandalen/wTools"
keywords = ["claude", "ai", "automation", "session", "cli"]
categories = ["command-line-utilities", "development-tools"]

[lints]
workspace = true

[lib]
name = "claude_session"
path = "src/lib.rs"

[dependencies]
# Zero dependencies for core functionality

[dev-dependencies]
tempfile.workspace = true

[features]
default = ["enabled"]
enabled = []
full = ["enabled"]
