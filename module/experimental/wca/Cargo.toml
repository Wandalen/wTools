[package]
name = "wca"
version = "0.49.0"
edition = "2021"
authors = [
  "Kostiantyn Mysnyk <wandalen@obox.systems>",
  "Dmytro Kryvoruchko <dmytro.kr@obox.systems>",
  "Bogdan Balushkin <bohdan.b@obox.systems>",
]
license = "MIT"
readme = "readme.md"
documentation = "https://docs.rs/wca"
repository = "https://github.com/Wandalen/wTools/tree/master/module/experimental/wca"
homepage = "https://github.com/Wandalen/wTools/tree/master/module/experimental/wca/readme.md"
description = """
The tool to make CLI ( commands user interface ). It is able to aggregate external binary applications, as well as functions, which are written in your language.
"""
categories = [ "command-line-interface", "command-line-utilities" ]
keywords = [ "wtools", "CLI", "CUI", "user-interface" ]

[lints]
workspace = true

[package.metadata.docs.rs]
features = [ "full", "error_tools/enabled", "strs_tools/enabled", "mod_interface/enabled", "former/enabled" ]
all-features = false

[features]
default = [ "enabled" ]
full = [ "enabled", "on_unknown_suggest" ]
enabled = [
  "dep:error_tools",
  "dep:mod_interface",
  "dep:itertools",
  "dep:former",
  "dep:log",
  "dep:indexmap",
]

# diagnostics features from test_tools
diagnostics_runtime_assertions = []
diagnostics_compiletime_assertions = []
diagnostics_memory_layout = []
no_std = []

# This configuration suggests an action to be done when the command is unknown. In this case, when an unknown command is encountered, the system might suggest alternatives
on_unknown_suggest = [ "dep:textdistance" ]

[[bench]]
name = "bench"
harness = false
required-features = [ "enabled" ]

[[example]]
name = "wca_trivial"
required-features = [ "enabled" ]

[[example]]
name = "wca_fluent"
required-features = [ "enabled" ]

[[example]]
name = "wca_shortcut"
required-features = [ "enabled" ]

[[example]]
name = "wca_custom_error"
required-features = [ "enabled" ]

[[example]]
name = "wca_suggest"
required-features = [ "enabled", "on_unknown_suggest" ]

[dependencies]

## internal
error_tools = { workspace = true, optional = true, features = [ "enabled", "error_typed", "error_untyped" ] }
mod_interface = { workspace = true, optional = true, features = [ "enabled" ] }
itertools = { workspace = true, optional = true, features = [ "use_std" ] }
former = { workspace = true, optional = true, features = [ "enabled", "derive_former" ] }

## external
log = { version = "0.4", optional = true }
#closure = "0.3"
textdistance = { version = "1.0", optional = true } # fuzzy commands search
indexmap = { version = "2.2.6", optional = true }

[dev-dependencies]
test_tools = { workspace = true, features = [ "full", "standalone_build" ] }
assert_fs = "1.0"
criterion = "0.5"
